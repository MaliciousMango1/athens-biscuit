services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: biscuits
      POSTGRES_USER: biscuits
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biscuits"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://biscuits:${DB_PASSWORD:-changeme}@db:5432/biscuits
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-}
      IP_HASH_SALT: ${IP_HASH_SALT:-change-this-salt}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
